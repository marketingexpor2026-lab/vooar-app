[[redirects]]
  from = "/api/*"
  to = "https://vooar-app-production.up.railway.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/uploads/*"
  to = "https://vooar-app-production.up.railway.app/uploads/:splat"
  status = 200
  force = true

# Digital Asset Links — necessário para TWA Android funcionar
[[redirects]]
  from = "/.well-known/assetlinks.json"
  to = "/well-known/assetlinks.json"
  status = 200
  force = true

[[headers]]
  for = "/well-known/assetlinks.json"
  [headers.values]
    Content-Type = "application/json"
    Access-Control-Allow-Origin = "*"
    Cache-Control = "no-cache"
